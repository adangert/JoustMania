name: CI

on:
  pull_request:
    branches: [main, master, dev-refactor]
  push:
    branches: [main, master, dev-refactor]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Repository name in lowercase for GHCR
  IMAGE_PREFIX: ghcr.io/watchmejoustmyflags/joustmania

jobs:
  # Lint shared code (lib/, root files) and check formatting
  lint-shared:
    name: Lint Shared Code & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Lint lib/
        run: |
          uv tool install ruff
          ruff check lib/ --output-format=github

      - name: Format check (entire codebase)
        run: ruff format --check .

  # Per-service matrix checks with path filtering
  # Runs lint/typecheck for all services, unit tests only for services with tests
  service-checks:
    name: ${{ matrix.service }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - controller_manager
          - game_coordinator
          - settings
          - menu
          - audio
          - supervisor
          - webui
        include:
          - service: controller_manager
            has_tests: true
          - service: game_coordinator
            has_tests: true
          - service: settings
            has_tests: true
          - service: menu
            has_tests: true
          - service: audio
            has_tests: true
          - service: supervisor
            has_tests: false
          - service: webui
            has_tests: false
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            service:
              - 'services/${{ matrix.service }}/**'
              - 'proto/**'
              - 'lib/**'

      - name: Install uv
        if: steps.changes.outputs.service == 'true'
        uses: astral-sh/setup-uv@v5

      # Install system dependencies for services with native Python packages
      - name: Install system dependencies
        if: steps.changes.outputs.service == 'true' && (matrix.service == 'controller_manager' || matrix.service == 'audio')
        run: |
          sudo apt-get update
          # controller_manager: dbus-python needs libdbus-1-dev and libglib2.0-dev
          # audio: pyalsaaudio needs libasound2-dev
          sudo apt-get install -y libdbus-1-dev libglib2.0-dev libasound2-dev pkg-config

      - name: Lint
        if: steps.changes.outputs.service == 'true'
        run: |
          uv tool install ruff
          cd services/${{ matrix.service }}
          ruff check .

      - name: Typecheck
        if: steps.changes.outputs.service == 'true'
        continue-on-error: true  # ty is immature, don't block CI
        run: |
          uv tool install ty
          cd services/${{ matrix.service }}
          uv sync
          ty check .

      - name: Unit tests
        if: steps.changes.outputs.service == 'true' && matrix.has_tests
        run: |
          cd services/${{ matrix.service }}
          uv sync --extra test
          uv run pytest tests/ -v --tb=short

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        run: make ci-lint-dockerfiles

  validate-protos:
    name: Validate Proto Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate protos
        run: make ci-validate-protos

  validate-packages:
    name: Validate Python Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate packages
        run: make ci-validate-packages

  # Detect which builder images need rebuilding based on file changes
  detect-builder-changes:
    name: Detect Builder Changes
    runs-on: ubuntu-latest
    outputs:
      builder: ${{ steps.filter.outputs.builder }}
      psmove: ${{ steps.filter.outputs.psmove }}
      pygame: ${{ steps.filter.outputs.pygame }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            builder:
              - 'images/builder/**'
            psmove:
              - 'images/psmove-builder/**'
            pygame:
              - 'images/pygame-builder/**'

  # Build and push builder images to GHCR (Phase 75)
  # Multi-platform builds for amd64 (CI/dev) and arm64 (Raspberry Pi)
  # Builder images are always pushed (needed for integration tests)
  # Optimization: Skip rebuild if files unchanged, re-tag stable image instead
  build-builder:
    name: Build builder
    runs-on: ubuntu-latest
    needs: [detect-builder-changes]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: needs.detect-builder-changes.outputs.builder == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Full build when files changed
      - name: Build and push builder
        if: needs.detect-builder-changes.outputs.builder == 'true'
        uses: docker/build-push-action@v5
        with:
          context: images/builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('{0}/builder:{1}', env.IMAGE_PREFIX, github.ref_name) || '' }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      # Re-tag stable image when unchanged (much faster)
      - name: Reuse stable image (unchanged)
        if: needs.detect-builder-changes.outputs.builder != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}/builder:dev-refactor

  build-psmove-builder:
    name: Build psmove-builder
    runs-on: ubuntu-latest
    needs: [detect-builder-changes]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: needs.detect-builder-changes.outputs.psmove == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Full build when files changed
      - name: Build and push psmove-builder
        if: needs.detect-builder-changes.outputs.psmove == 'true'
        uses: docker/build-push-action@v5
        with:
          context: images/psmove-builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('{0}/psmove-builder:{1}', env.IMAGE_PREFIX, github.ref_name) || '' }}
          cache-from: type=gha,scope=psmove-builder
          cache-to: type=gha,mode=max,scope=psmove-builder

      # Re-tag stable image when unchanged (much faster)
      - name: Reuse stable image (unchanged)
        if: needs.detect-builder-changes.outputs.psmove != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}/psmove-builder:dev-refactor

  docker-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-builder, build-psmove-builder, integration-test]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - controller_manager
          - game_coordinator
          - settings
          - supervisor
          - menu
          - audio
          - webui
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert service name to image name
        id: image_name
        run: |
          # Convert underscore to hyphen for docker image name
          SERVICE="${{ matrix.service }}"
          IMAGE_NAME="${SERVICE//_/-}-service"
          echo "name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ steps.image_name.outputs.name }}:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('{0}/{1}:{2}', env.IMAGE_PREFIX, steps.image_name.outputs.name, github.ref_name) || '' }}
          build-args: |
            BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }}
            PSMOVE_BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Build non-Python services (Go/Node.js)
  docker-build-extra:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [integration-test]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: connect-proxy
            dockerfile: services/connect-proxy/Dockerfile
            image_name: connect-proxy
          - service: dashboard
            dockerfile: services/dashboard/Dockerfile
            image_name: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('{0}/{1}:{2}', env.IMAGE_PREFIX, matrix.image_name, github.ref_name) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-builder, build-psmove-builder]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run integration tests
        env:
          BUILDER_IMAGE: ${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }}
          PSMOVE_BUILDER_IMAGE: ${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }}
        run: make test

  # Final status check job for branch protection
  # This job depends on all other jobs and provides a single status check
  # that represents the entire CI pipeline's health
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - lint-shared
      - service-checks
      - lint-dockerfiles
      - validate-protos
      - validate-packages
      - build-builder
      - build-psmove-builder
      - docker-build
      - docker-build-extra
      - integration-test
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # Check if any job failed or was cancelled
          FAILED="${{ contains(needs.*.result, 'failure') }}"
          CANCELLED="${{ contains(needs.*.result, 'cancelled') }}"
          if [[ "$FAILED" == "true" || "$CANCELLED" == "true" ]]; then
            echo "❌ One or more CI jobs failed or were cancelled"
            echo "Job results:"
            echo "  lint-shared: ${{ needs.lint-shared.result }}"
            echo "  service-checks: ${{ needs.service-checks.result }}"
            echo "  lint-dockerfiles: \
          ${{ needs.lint-dockerfiles.result }}"
            echo "  validate-protos: \
          ${{ needs.validate-protos.result }}"
            echo "  validate-packages: \
          ${{ needs.validate-packages.result }}"
            echo "  build-builder: ${{ needs.build-builder.result }}"
            echo "  build-psmove-builder: \
          ${{ needs.build-psmove-builder.result }}"
            echo "  docker-build: ${{ needs.docker-build.result }}"
            echo "  docker-build-extra: \
          ${{ needs.docker-build-extra.result }}"
            echo "  integration-test: \
          ${{ needs.integration-test.result }}"
            exit 1
          fi
          echo "✅ All CI checks passed successfully!"
