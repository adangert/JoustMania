name: CI

on:
  pull_request:
    branches: [main, master, dev-refactor]
  push:
    branches: [main, master, dev-refactor]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Repository name in lowercase for GHCR
  IMAGE_PREFIX: ghcr.io/watchmejoustmyflags/joustmania

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run linting and format check
        run: make ci-quick

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run type checking
        run: make typecheck

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        run: make lint-dockerfiles

  validate-protos:
    name: Validate Proto Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate protos
        run: make validate-protos

  validate-packages:
    name: Validate Python Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate packages
        run: make validate-packages

  # Build and push builder images to GHCR (Phase 75)
  # Multi-platform builds for amd64 (CI/dev) and arm64 (Raspberry Pi)
  # Builder images are always pushed (needed for integration tests)
  build-builder:
    name: Build builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder
        uses: docker/build-push-action@v5
        with:
          context: images/builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/builder:${{ github.ref_name }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

  build-psmove-builder:
    name: Build psmove-builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push psmove-builder
        uses: docker/build-push-action@v5
        with:
          context: images/psmove-builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.ref_name }}
          cache-from: type=gha,scope=psmove-builder
          cache-to: type=gha,mode=max,scope=psmove-builder

  build-pygame-builder:
    name: Build pygame-builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push pygame-builder
        uses: docker/build-push-action@v5
        with:
          context: images/pygame-builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/pygame-builder:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/pygame-builder:${{ github.ref_name }}
          cache-from: type=gha,scope=pygame-builder
          cache-to: type=gha,mode=max,scope=pygame-builder

  # Build service images - only push on direct pushes (not PRs)
  docker-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-builder, build-psmove-builder, build-pygame-builder, integration-test]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - controller_manager
          - game_coordinator
          - settings
          - supervisor
          - menu
          - audio
          - webui
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert service name to image name
        id: image_name
        run: |
          # Convert underscore to hyphen for docker image name
          SERVICE="${{ matrix.service }}"
          IMAGE_NAME="${SERVICE//_/-}-service"
          echo "name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ steps.image_name.outputs.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ steps.image_name.outputs.name }}:${{ github.ref_name }}
          build-args: |
            BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }}
            PSMOVE_BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }}
            PYGAME_BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/pygame-builder:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-builder, build-psmove-builder, build-pygame-builder]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run integration tests
        env:
          BUILDER_IMAGE: ${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }}
          PSMOVE_BUILDER_IMAGE: ${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }}
          PYGAME_BUILDER_IMAGE: ${{ env.IMAGE_PREFIX }}/pygame-builder:${{ github.sha }}
        run: make test
