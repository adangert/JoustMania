name: CI

on:
  pull_request:
    branches: [main, master, dev-refactor]
  push:
    branches: [main, master, dev-refactor]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Repository name in lowercase for GHCR
  IMAGE_PREFIX: ghcr.io/watchmejoustmyflags/joustmania

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run linting and format check
        run: make ci-quick

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run type checking
        run: make typecheck

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        run: make lint-dockerfiles

  validate-protos:
    name: Validate Proto Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate protos
        run: make validate-protos

  validate-packages:
    name: Validate Python Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate packages
        run: make validate-packages

  # Build and push builder images to GHCR (Phase 75)
  build-builders:
    name: Build ${{ matrix.builder }} Builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        builder:
          - name: builder
            context: images/builder
          - name: psmove-builder
            context: images/psmove-builder
          - name: pygame-builder
            context: images/pygame-builder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.builder.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.builder.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-builders
    strategy:
      fail-fast: false
      matrix:
        service:
          - controller_manager
          - game_coordinator
          - settings
          - supervisor
          - menu
          - audio
          - webui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build service
        run: |
          make build-service SERVICE=${{ matrix.service }} \
            BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }} \
            PSMOVE_BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }} \
            PYGAME_BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/pygame-builder:${{ github.sha }}

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-builders
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run integration tests
        run: |
          make test \
            BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/builder:${{ github.sha }} \
            PSMOVE_BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/psmove-builder:${{ github.sha }} \
            PYGAME_BUILDER_IMAGE=${{ env.IMAGE_PREFIX }}/pygame-builder:${{ github.sha }}
