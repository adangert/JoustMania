# Pre-commit hooks for JoustMania
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      # Run the linter - ruff discovers config from file's directory (pyproject.toml)
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format
