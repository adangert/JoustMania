# CI Override - No hardware dependencies
#
# Use this for CI/testing environments without sound hardware:
#   docker-compose -f docker-compose.yml -f docker-compose.ci.yml up
#
# Or with the override file for port exposures:
#   docker-compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.ci.yml up

services:
  # Audio Service - Mock mode, no sound device required
  audio:
    devices: []  # Override: remove /dev/snd requirement
    environment:
      - MOCK_MODE=true
      - OTEL_SERVICE_NAME=audio-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317

  # Controller Manager - Mock mode, no Bluetooth required
  controller-manager:
    devices: []  # Override: remove /dev requirement
    volumes: []  # Override: remove D-Bus and Bluetooth volumes
    environment:
      - CONTROLLER_BACKEND=mock
      - MOCK_CONTROLLER_COUNT=${MOCK_CONTROLLER_COUNT:-4}
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
