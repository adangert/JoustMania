# CI Override - No hardware dependencies
#
# Use this for CI/testing environments without sound hardware:
#   docker-compose -f docker-compose.yml -f docker-compose.ci.yml up
#
# Or with the override file for port exposures:
#   docker-compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.ci.yml up
#
# Note: We must fully redefine services to clear device/volume lists
# (docker-compose merges arrays, doesn't replace them)

services:
  # Audio Service - Mock mode, no sound device required
  # Fully redefined to remove devices list
  audio:
    # Clear devices list from base compose (requires docker compose v2.24.0+)
    devices: !reset []
    environment: !reset
      - MOCK_MODE=true
      - OTEL_SERVICE_NAME=audio-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317

  # Controller Manager - Mock mode, no Bluetooth required
  controller-manager:
    # Clear devices and volumes from base compose (requires docker compose v2.24.0+)
    devices: !reset []
    volumes: !reset []
    privileged: false
    environment: !reset
      - CONTROLLER_BACKEND=mock
      - MOCK_CONTROLLER_COUNT=4
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
