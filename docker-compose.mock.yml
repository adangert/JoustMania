version: '3.8'

services:
  # Redis for pub/sub messaging
  redis:
    image: redis:7.4-alpine
    container_name: joustmania-redis
    ports:
      - "6379:6379"
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger for distributed tracing UI
  jaeger:
    image: jaegertracing/jaeger:2.14.1
    container_name: joustmania-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "14250:14250"  # Jaeger collector gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:16686" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: joustmania-otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "13133:13133" # Health check
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:13133" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Settings Service
  settings:
    build:
      context: .
      dockerfile: services/settings/Dockerfile
    container_name: joustmania-settings
    ports:
      - "50051:50051"
    environment:
      - OTEL_SERVICE_NAME=settings-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./joustsettings.yaml:/app/joustsettings.yaml
    depends_on:
      otel-collector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped

  # Mock Controller Manager Service (REPLACES real controller-manager)
  mock-controller-manager:
    build:
      context: .
      dockerfile: services/controller_manager/Dockerfile.mock
    container_name: joustmania-mock-controller-manager
    ports:
      - "50052:50052"  # Main ControllerManager gRPC port
      - "50062:50062"  # Mock control API port
    environment:
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - MOCK_CONTROLLER_COUNT=4  # CONFIGURABLE: Number of mock controllers
      - MOCK_MODE=true
    depends_on:
      otel-collector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    # Note: No privileged mode, no bluetooth, no USB devices needed!

  # Game Coordinator Service
  game-coordinator:
    build:
      context: .
      dockerfile: services/game_coordinator/Dockerfile
    container_name: joustmania-game-coordinator
    ports:
      - "50053:50053"
    environment:
      - OTEL_SERVICE_NAME=game-coordinator-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - CONTROLLER_MANAGER_SERVICE=mock-controller-manager:50052  # Point to mock
    depends_on:
      otel-collector:
        condition: service_healthy
      redis:
        condition: service_healthy
      settings:
        condition: service_started
      mock-controller-manager:
        condition: service_started
    networks:
      - joustmania
    restart: unless-stopped

  # Menu Service
  menu:
    build:
      context: .
      dockerfile: services/menu/Dockerfile
    container_name: joustmania-menu
    ports:
      - "50054:50054"
    environment:
      - OTEL_SERVICE_NAME=menu-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - CONTROLLER_MANAGER_SERVICE=mock-controller-manager:50052  # Point to mock
    depends_on:
      otel-collector:
        condition: service_healthy
      redis:
        condition: service_healthy
      settings:
        condition: service_started
      mock-controller-manager:
        condition: service_started
    networks:
      - joustmania
    restart: unless-stopped

  # Supervisor Service
  supervisor:
    build:
      context: .
      dockerfile: services/supervisor/Dockerfile
    container_name: joustmania-supervisor
    ports:
      - "50055:50055"
    environment:
      - OTEL_SERVICE_NAME=supervisor-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_healthy
      settings:
        condition: service_started
      mock-controller-manager:
        condition: service_started
      game-coordinator:
        condition: service_started
      menu:
        condition: service_started
    networks:
      - joustmania
    restart: unless-stopped

  # Web UI Service
  webui:
    build:
      context: .
      dockerfile: services/webui/Dockerfile
    container_name: joustmania-webui
    ports:
      - "80:80"
    environment:
      - OTEL_SERVICE_NAME=webui-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - SETTINGS_SERVICE=settings:50051
      - CONTROLLER_MANAGER_SERVICE=mock-controller-manager:50052  # Point to mock
      - MENU_SERVICE=menu:50054
      - SUPERVISOR_SERVICE=supervisor:50055
      - GAME_COORDINATOR_SERVICE=game-coordinator:50053
    depends_on:
      otel-collector:
        condition: service_healthy
      settings:
        condition: service_started
      mock-controller-manager:
        condition: service_started
      menu:
        condition: service_started
      supervisor:
        condition: service_started
    networks:
      - joustmania
    restart: unless-stopped

  # Mock Audio Service (no hardware access needed)
  audio:
    build:
      context: .
      dockerfile: services/audio/Dockerfile
    container_name: joustmania-audio
    volumes:
      - ./services/audio/assets:/app/services/audio/assets:ro  # Audio files (read-only)
    ports:
      - "50056:50056"
    environment:
      - OTEL_SERVICE_NAME=audio-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - MOCK_MODE=true  # No actual audio output in mock mode
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    # Note: No privileged mode, no audio devices in mock mode

networks:
  joustmania:
    driver: bridge
    name: joustmania-network

volumes:
  redis-data:
