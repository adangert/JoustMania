# Local Development Override
#
# This file is automatically loaded by docker-compose and overrides
# settings for local development without hardware (mock mode).
#
# To use production mode instead:
#   docker-compose -f docker-compose.yml up
#
# Or delete/rename this file.

services:
  # Controller Manager - Mock mode (no Bluetooth/USB needed)
  controller-manager:
    privileged: false  # No hardware access needed in mock mode
    volumes: []        # Remove DBus mount
    devices: []        # Remove USB devices
    expose:
      - "50062"  # Mock control API (for integration tests)
    ports:
      - "50062:50062"  # Expose mock control API to host for testing
    environment:
      - CONTROLLER_BACKEND=mock
      - MOCK_CONTROLLER_COUNT=${MOCK_CONTROLLER_COUNT:-4}
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317

  # Audio Service - Mock mode (no audio hardware needed)
  audio:
    privileged: false  # No hardware access needed in mock mode
    devices: []        # Remove audio devices
    environment:
      - MOCK_MODE=true
      - OTEL_SERVICE_NAME=audio-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
