# Local Development Override
#
# This file is automatically loaded by docker-compose and adds
# development-friendly settings (port exposures for testing tools).
#
# Base config (docker-compose.yml) already defaults to mock mode.

services:
  # Controller Manager - Expose ports for testing
  controller-manager:
    expose:
      - "50062"  # Mock control API (for integration tests)
    ports:
      - "50052:50052"  # Main gRPC port
      - "50062:50062"  # Mock control API

  # Game Coordinator - Expose ports for testing
  game-coordinator:
    ports:
      - "50053:50053"  # Main gRPC port

  # Menu - Expose ports for testing
  menu:
    ports:
      - "50054:50054"  # Main gRPC port

  # Settings - Expose ports for testing
  settings:
    ports:
      - "50055:50051"  # Main gRPC port (host 50055 -> container 50051)

  # Audio - Expose ports for testing
  audio:
    ports:
      - "50056:50056"  # Main gRPC port
