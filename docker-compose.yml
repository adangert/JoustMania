version: '3.8'

# JoustMania Docker Compose Configuration
#
# Quick Start (local build):
#   make builders   # Build base images once (~15min on Pi)
#   make images     # Build all service images
#   make up         # Start all services
#
# Quick Start (pull from GHCR - no local build needed):
#   IMAGE_PREFIX=ghcr.io/watchmejoustmyflags/joustmania IMAGE_TAG=dev-refactor make up
#
# Or just: make up (builds everything automatically)
#
# Base config defaults to bluetooth mode (real hardware).
# For mock mode (testing): CONTROLLER_BACKEND=mock AUDIO_MOCK_MODE=true make up
#
# Environment Variables (can be set in shell or .env file):
# - IMAGE_PREFIX: Image registry prefix [default: joustmania, or ghcr.io/watchmejoustmyflags/joustmania]
# - IMAGE_TAG: Image tag to use [default: latest]
# - BUILDER_IMAGE: Base builder image for local builds [default: joustmania/builder:latest]
# - PSMOVE_BUILDER_IMAGE: PSMove builder image [default: joustmania/psmove-builder:latest]
# - PYGAME_BUILDER_IMAGE: Pygame builder image [default: joustmania/pygame-builder:latest]
# - CONTROLLER_BACKEND: Controller backend type (bluetooth, mock, windows) [default: bluetooth]
# - MOCK_CONTROLLER_COUNT: Number of mock controllers when CONTROLLER_BACKEND=mock [default: 4]
# - AUDIO_MOCK_MODE: Disable audio output for testing [default: false]
# - LOG_LEVEL: Logging level for all services (DEBUG, INFO, WARNING, ERROR) [default: INFO]

services:
  # Redis for pub/sub messaging
  redis:
    image: redis:7.4-alpine
    container_name: joustmania-redis
    # Port 6379 exposed only within Docker network (no host binding)
    expose:
      - "6379"
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger for distributed tracing UI
  jaeger:
    image: jaegertracing/jaeger:2.14.1
    container_name: joustmania-jaeger
    ports:
      - "16686:16686"  # Jaeger UI (exposed to host for browser access)
    # Collector ports (14268, 14250) exposed only within Docker network
    expose:
      - "14268"  # Jaeger collector HTTP
      - "14250"  # Jaeger collector gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:16686" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: joustmania-otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./services/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    ports:
      # Only expose Prometheus metrics for external monitoring
      - "8889:8889"   # Prometheus metrics (Jaeger uses 8888)
      # OTLP ports (4317, 4318) and health check (13133) are only used internally
    depends_on:
      jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - joustmania
    # No healthcheck: distroless image has no shell/wget/curl

  # Settings Service
  settings:
    image: ${IMAGE_PREFIX:-joustmania}/settings-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/settings/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-joustmania/builder:latest}
    container_name: joustmania-settings
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50051"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=settings-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # - LOG_LEVEL=INFO  # Uncomment to override logging level (DEBUG, INFO, WARNING, ERROR)
    volumes:
      - ./joustsettings.yaml:/app/joustsettings.yaml
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50051'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Controller Manager Service
  controller-manager:
    image: ${IMAGE_PREFIX:-joustmania}/controller-manager-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/controller_manager/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-joustmania/builder:latest}
        PSMOVE_BUILDER_IMAGE: ${PSMOVE_BUILDER_IMAGE:-joustmania/psmove-builder:latest}
    container_name: joustmania-controller-manager
    privileged: true
    volumes:
      # D-Bus socket for BlueZ communication
      - /var/run/dbus:/var/run/dbus:ro
      # Bluetooth device info (read-only, pairing handled by host daemon)
      - /var/lib/bluetooth:/var/lib/bluetooth:ro
      # PS Move calibration data (created by host pairing daemon)
      - ${HOME}/.psmoveapi:/root/.psmoveapi:ro
    devices:
      # PS Move controllers use hidraw for Bluetooth communication
      - /dev:/dev
    networks:
      - joustmania
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50052"  # gRPC service
      - "8000"   # Prometheus metrics
    environment:
      - CONTROLLER_BACKEND=${CONTROLLER_BACKEND:-bluetooth}
      - MOCK_CONTROLLER_COUNT=${MOCK_CONTROLLER_COUNT:-4}
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/dbus/system_bus_socket
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50052'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Game Coordinator Service
  game-coordinator:
    image: ${IMAGE_PREFIX:-joustmania}/game-coordinator-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/game_coordinator/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-joustmania/builder:latest}
    container_name: joustmania-game-coordinator
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50053"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=game-coordinator-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50053'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Menu Service
  menu:
    image: ${IMAGE_PREFIX:-joustmania}/menu-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/menu/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-joustmania/builder:latest}
    container_name: joustmania-menu
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50054"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=menu-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # Phase 60: Audio service connection
      - AUDIO_HOST=audio
      - AUDIO_PORT=50056
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      audio:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50054'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Supervisor Service
  supervisor:
    image: ${IMAGE_PREFIX:-joustmania}/supervisor-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/supervisor/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-joustmania/builder:latest}
    container_name: joustmania-supervisor
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50055"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=supervisor-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      game-coordinator:
        condition: service_healthy
      menu:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50055'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Web UI Service
  webui:
    image: ${IMAGE_PREFIX:-joustmania}/webui-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/webui/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-joustmania/builder:latest}
    container_name: joustmania-webui
    ports:
      - "80:80"  # WebUI exposed to host for browser access
    # Metrics port exposed only within Docker network (Phase 38)
    expose:
      - "8000"  # Prometheus metrics
    environment:
      - OTEL_SERVICE_NAME=webui-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - SETTINGS_SERVICE=settings:50051
      - CONTROLLER_MANAGER_SERVICE=controller-manager:50052
      - MENU_SERVICE=menu:50054
      - SUPERVISOR_SERVICE=supervisor:50055
    depends_on:
      otel-collector:
        condition: service_started
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      menu:
        condition: service_healthy
      supervisor:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health', timeout=2); exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Audio Service
  audio:
    image: ${IMAGE_PREFIX:-joustmania}/audio-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/audio/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-joustmania/builder:latest}
        PYGAME_BUILDER_IMAGE: ${PYGAME_BUILDER_IMAGE:-joustmania/pygame-builder:latest}
    container_name: joustmania-audio
    # Sound device access for real audio output
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - ./services/audio/assets:/app/services/audio/assets:ro  # Audio files (read-only)
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50056"  # gRPC service
      - "8000"   # Prometheus metrics
    environment:
      - MOCK_MODE=${AUDIO_MOCK_MODE:-false}
      - OTEL_SERVICE_NAME=audio-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50056'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Prometheus for metrics collection (Phase 38)
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: joustmania-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"  # Prometheus UI exposed to host for browser access
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./services/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Grafana for metrics visualization (Phase 38)
  grafana:
    image: grafana/grafana:10.2.3
    container_name: joustmania-grafana
    ports:
      - "3000:3000"  # Grafana UI exposed to host for browser access
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=joustmania
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Loki for log aggregation with 1h retention
  loki:
    image: grafana/loki:2.9.3
    container_name: joustmania-loki
    user: "0"  # Run as root to avoid permission issues with volume
    ports:
      - "3100:3100"  # Loki HTTP API (for queries and ingestion)
    volumes:
      - ./services/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test:  ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  joustmania:
    driver: bridge
    name: joustmania-network

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
