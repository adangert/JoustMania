version: '3.8'

services:
  # Redis for pub/sub messaging
  redis:
    image: redis:7-alpine
    container_name: joustmania-redis
    ports:
      - "6379:6379"
    networks:
      - joustmania
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger for distributed tracing UI
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: joustmania-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "14250:14250"  # Jaeger collector gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - joustmania
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: joustmania-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "13133:13133" # Health check
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - joustmania
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Settings Service
  settings:
    build:
      context: .
      dockerfile: services/settings/Dockerfile
    container_name: joustmania-settings
    ports:
      - "50051:50051"
    environment:
      - OTEL_SERVICE_NAME=settings-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./joustsettings.yaml:/app/joustsettings.yaml
    depends_on:
      otel-collector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped

  # Controller Manager Service
  controller-manager:
    build:
      context: .
      dockerfile: services/controller_manager/Dockerfile
    container_name: joustmania-controller-manager
    ports:
      - "50052:50052"
    environment:
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    privileged: true  # Required for Bluetooth access
    devices:
      - /dev/bus/usb:/dev/bus/usb  # USB devices for PS Move
    depends_on:
      otel-collector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped

  # Game Coordinator Service (not implemented yet - Phase 8b)
  # game-coordinator:
  #   build:
  #     context: .
  #     dockerfile: services/game_coordinator/Dockerfile
  #   container_name: joustmania-game-coordinator
  #   ports:
  #     - "50053:50053"
  #   environment:
  #     - OTEL_SERVICE_NAME=game-coordinator-service
  #     - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
  #   depends_on:
