version: '3.8'

services:
  # Redis for pub/sub messaging
  redis:
    image: redis:7.4-alpine
    container_name: joustmania-redis
    # Port 6379 exposed only within Docker network (no host binding)
    expose:
      - "6379"
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger for distributed tracing UI
  jaeger:
    image: jaegertracing/jaeger:2.14.1
    container_name: joustmania-jaeger
    ports:
      - "16686:16686"  # Jaeger UI (exposed to host for browser access)
    # Collector ports (14268, 14250) exposed only within Docker network
    expose:
      - "14268"  # Jaeger collector HTTP
      - "14250"  # Jaeger collector gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:16686" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: joustmania-otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      # Only expose Prometheus metrics for external monitoring
      - "8889:8889"   # Prometheus metrics (Jaeger uses 8888)
      # OTLP ports (4317, 4318) and health check (13133) are only used internally
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - joustmania
    # No healthcheck: distroless image has no shell/wget/curl

  # Settings Service
  settings:
    build:
      context: .
      dockerfile: services/settings/Dockerfile
    container_name: joustmania-settings
    # Port 50051 exposed only within Docker network (no host binding)
    expose:
      - "50051"
    environment:
      - OTEL_SERVICE_NAME=settings-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./joustsettings.yaml:/app/joustsettings.yaml
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50051'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Controller Manager Service
  controller-manager:
    build:
      context: .
      dockerfile: services/controller_manager/Dockerfile
    container_name: joustmania-controller-manager
    privileged: true  # Required for Bluetooth + USB access
    # FIXED: Use bridge network instead of host mode for proper DNS resolution
    # Bluetooth/USB still work via privileged mode + device mounts
    networks:
      - joustmania
    volumes:
      - /var/run/dbus:/var/run/dbus  # DBus for Bluetooth pairing
    devices:
      - /dev/bus/usb:/dev/bus/usb  # USB devices for PS Move
    # Port exposed only within Docker network (no host binding)
    expose:
      - "50052"
    environment:
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/dbus/system_bus_socket
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50052'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Game Coordinator Service
  game-coordinator:
    build:
      context: .
      dockerfile: services/game_coordinator/Dockerfile
    container_name: joustmania-game-coordinator
    # Port 50053 exposed only within Docker network (no host binding)
    expose:
      - "50053"
    environment:
      - OTEL_SERVICE_NAME=game-coordinator-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50053'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Menu Service
  menu:
    build:
      context: .
      dockerfile: services/menu/Dockerfile
    container_name: joustmania-menu
    # Port 50054 exposed only within Docker network (no host binding)
    expose:
      - "50054"
    environment:
      - OTEL_SERVICE_NAME=menu-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50054'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Supervisor Service
  supervisor:
    build:
      context: .
      dockerfile: services/supervisor/Dockerfile
    container_name: joustmania-supervisor
    # Port 50055 exposed only within Docker network (no host binding)
    expose:
      - "50055"
    environment:
      - OTEL_SERVICE_NAME=supervisor-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      game-coordinator:
        condition: service_healthy
      menu:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50055'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Web UI Service
  webui:
    build:
      context: .
      dockerfile: services/webui/Dockerfile
    container_name: joustmania-webui
    ports:
      - "80:80"  # WebUI exposed to host for browser access
    environment:
      - OTEL_SERVICE_NAME=webui-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - SETTINGS_SERVICE=settings:50051
      - CONTROLLER_MANAGER_SERVICE=controller-manager:50052
      - MENU_SERVICE=menu:50054
      - SUPERVISOR_SERVICE=supervisor:50055
    depends_on:
      otel-collector:
        condition: service_started
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      menu:
        condition: service_healthy
      supervisor:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health', timeout=2); exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Audio Service
  audio:
    build:
      context: .
      dockerfile: services/audio/Dockerfile
    container_name: joustmania-audio
    privileged: true  # Required for audio device access
    devices:
      - /dev/snd:/dev/snd  # Audio hardware
    volumes:
      - ./services/audio/assets:/app/services/audio/assets:ro  # Audio files (read-only)
    # Port 50056 exposed only within Docker network (no host binding)
    expose:
      - "50056"
    environment:
      - OTEL_SERVICE_NAME=audio-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; channel = grpc.insecure_channel('localhost:50056'); stub = health_pb2_grpc.HealthStub(channel); response = stub.Check(health_pb2.HealthCheckRequest(), timeout=2); exit(0 if response.status == health_pb2.HealthCheckResponse.SERVING else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  joustmania:
    driver: bridge
    name: joustmania-network

volumes:
  redis-data:
