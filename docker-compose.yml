version: '3.8'

# JoustMania Docker Compose Configuration
#
# Quick Start (pull from GHCR - no build needed):
#   docker compose pull  # Pull all images from GHCR
#   docker compose up -d # Start all services
#   # Or: make up-pull
#
# Quick Start (local build):
#   make builders        # Build base images once (~15min on Pi)
#   make up              # Build and start all services
#
# Base config defaults to bluetooth mode (real hardware).
# For mock mode (testing): CONTROLLER_BACKEND=mock AUDIO_MOCK_MODE=true make up
#
# Environment Variables (can be set in shell or .env file):
# - IMAGE_TAG: Image tag to use [default: latest]
# - CONTROLLER_BACKEND: Controller backend type (bluetooth, mock, windows) [default: bluetooth]
# - MOCK_CONTROLLER_COUNT: Number of mock controllers when CONTROLLER_BACKEND=mock [default: 4]
# - AUDIO_MOCK_MODE: Disable audio output for testing [default: false]
# - LOG_LEVEL: Logging level for all services (DEBUG, INFO, WARNING, ERROR) [default: INFO]
#
# Notes:
# - All images default to ghcr.io/watchmejoustmyflags/joustmania registry
# - Use IMAGE_TAG to specify version (e.g., IMAGE_TAG=dev-refactor docker compose up)
# - Local builds tag images with GHCR names for consistency

services:
  # Redis for pub/sub messaging
  redis:
    image: redis:7.4-alpine
    container_name: joustmania-redis
    # Port 6379 exposed only within Docker network (no host binding)
    expose:
      - "6379"
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger for distributed tracing UI
  jaeger:
    image: jaegertracing/jaeger:2.14.1
    container_name: joustmania-jaeger
    # All ports exposed only within Docker network (envoy proxies to it)
    expose:
      - "16686"  # Jaeger UI
      - "4317"   # OTLP gRPC (used by otel-collector)
      - "4318"   # OTLP HTTP
    volumes:
      - ./services/jaeger/config.yaml:/etc/jaeger/config.yaml:ro
    command: ["--config", "/etc/jaeger/config.yaml"]
    networks:
      - joustmania
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:16686" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: joustmania-otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./services/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    ports:
      # Only expose Prometheus metrics for external monitoring
      - "8889:8889"   # Prometheus metrics (Jaeger uses 8888)
      # OTLP port exposed for host services (e.g., psmove-pairing daemon)
      - "4317:4317"   # OTLP gRPC receiver
    depends_on:
      jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - joustmania
    # No healthcheck: distroless image has no shell/wget/curl

  # Settings Service
  settings:
    image: ghcr.io/watchmejoustmyflags/joustmania/settings-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/settings/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/builder:latest}
    container_name: joustmania-settings
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50051"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=settings-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # - LOG_LEVEL=INFO  # Uncomment to override logging level (DEBUG, INFO, WARNING, ERROR)
    volumes:
      - ./joustsettings.yaml:/app/joustsettings.yaml
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    # Healthcheck defined in Dockerfile (uses grpc_health_probe)

  # Controller Manager Service
  controller-manager:
    image: ghcr.io/watchmejoustmyflags/joustmania/controller-manager-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/controller_manager/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/builder:latest}
        PSMOVE_BUILDER_IMAGE: ${PSMOVE_BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/psmove-builder:latest}
    container_name: joustmania-controller-manager
    privileged: true
    # Required for controller hot-plug: run in host PID namespace to see new devices
    pid: "host"
    volumes:
      # D-Bus socket for BlueZ communication
      - /var/run/dbus:/var/run/dbus:ro
      # Bluetooth device info (read-only, pairing handled by host daemon)
      - /var/lib/bluetooth:/var/lib/bluetooth:ro
      # PS Move calibration data (created by host pairing daemon)
      - ${HOME}/.psmoveapi:/root/.psmoveapi:ro
      # Mount devtmpfs with rslave for hot-plug device visibility
      - /dev:/dev:rslave
    networks:
      - joustmania
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50052"  # gRPC service
      - "8000"   # Prometheus metrics
    environment:
      - CONTROLLER_BACKEND=${CONTROLLER_BACKEND:-bluetooth}
      - MOCK_CONTROLLER_COUNT=${MOCK_CONTROLLER_COUNT:-4}
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/var/run/dbus/system_bus_socket
      - OTEL_SERVICE_NAME=controller-manager-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Healthcheck defined in Dockerfile (uses grpc_health_probe)

  # Game Coordinator Service
  game-coordinator:
    image: ghcr.io/watchmejoustmyflags/joustmania/game-coordinator-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/game_coordinator/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/builder:latest}
    container_name: joustmania-game-coordinator
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50053"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=game-coordinator-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    # Healthcheck defined in Dockerfile (uses grpc_health_probe)

  # Menu Service
  menu:
    image: ghcr.io/watchmejoustmyflags/joustmania/menu-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/menu/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/builder:latest}
    container_name: joustmania-menu
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50054"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=menu-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # Phase 60: Audio service connection
      - AUDIO_HOST=audio
      - AUDIO_PORT=50056
    depends_on:
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      game-coordinator:
        condition: service_healthy
      audio:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    # Healthcheck defined in Dockerfile (uses grpc_health_probe)

  # Supervisor Service
  supervisor:
    image: ghcr.io/watchmejoustmyflags/joustmania/supervisor-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/supervisor/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/builder:latest}
    container_name: joustmania-supervisor
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50055"  # gRPC service
      - "8000"   # Prometheus metrics (Phase 38)
    environment:
      - OTEL_SERVICE_NAME=supervisor-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      game-coordinator:
        condition: service_healthy
      menu:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    # Healthcheck defined in Dockerfile (uses grpc_health_probe)

  # Web UI Service (legacy - accessed via /legacy/ through envoy)
  webui:
    image: ghcr.io/watchmejoustmyflags/joustmania/webui-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/webui/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/builder:latest}
    container_name: joustmania-webui
    # All ports exposed only within Docker network (envoy proxies to /legacy/)
    expose:
      - "80"    # WebUI (proxied through envoy)
      - "8000"  # Prometheus metrics
    environment:
      - OTEL_SERVICE_NAME=webui-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - SETTINGS_SERVICE=settings:50051
      - CONTROLLER_MANAGER_SERVICE=controller-manager:50052
      - MENU_SERVICE=menu:50054
      - SUPERVISOR_SERVICE=supervisor:50055
    depends_on:
      otel-collector:
        condition: service_started
      settings:
        condition: service_healthy
      controller-manager:
        condition: service_healthy
      menu:
        condition: service_healthy
      supervisor:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    # Healthcheck defined in Dockerfile (uses wget)

  # Audio Service
  audio:
    image: ghcr.io/watchmejoustmyflags/joustmania/audio-service:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/audio/Dockerfile
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-ghcr.io/watchmejoustmyflags/joustmania/builder:latest}
    container_name: joustmania-audio
    # Sound device access for real audio output
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - ./services/audio/assets:/app/services/audio/assets:ro  # Audio files (read-only)
    # Ports exposed only within Docker network (no host binding)
    expose:
      - "50056"  # gRPC service
      - "8000"   # Prometheus metrics
    environment:
      - MOCK_MODE=${AUDIO_MOCK_MODE:-false}
      - OTEL_SERVICE_NAME=audio-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - joustmania
    restart: unless-stopped
    # Healthcheck defined in Dockerfile (uses grpc_health_probe)

  # Prometheus for metrics collection (Phase 38)
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: joustmania-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=/prometheus/'
      - '--web.route-prefix=/'
    # Port exposed only within Docker network (envoy proxies to it)
    expose:
      - "9090"
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./services/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host services (e.g., psmove-pairing daemon)
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node Exporter for host metrics (CPU, memory, disk, temperature)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: joustmania-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      # Disable slow/unnecessary collectors for Raspberry Pi
      - '--no-collector.arp'
      - '--no-collector.bcache'
      - '--no-collector.bonding'
      - '--no-collector.btrfs'
      - '--no-collector.conntrack'
      - '--no-collector.edac'
      - '--no-collector.entropy'
      - '--no-collector.fibrechannel'
      - '--no-collector.infiniband'
      - '--no-collector.ipvs'
      - '--no-collector.mdadm'
      - '--no-collector.nfs'
      - '--no-collector.nfsd'
      - '--no-collector.nvme'
      - '--no-collector.powersupplyclass'
      - '--no-collector.pressure'
      - '--no-collector.rapl'
      - '--no-collector.schedstat'
      - '--no-collector.softnet'
      - '--no-collector.tapestats'
      - '--no-collector.textfile'
      - '--no-collector.timex'
      - '--no-collector.xfs'
      - '--no-collector.zfs'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9100/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Grafana for metrics visualization (Phase 38)
  grafana:
    image: grafana/grafana:10.2.3
    container_name: joustmania-grafana
    # Port exposed only within Docker network (envoy proxies to it)
    expose:
      - "3000"
    environment: []
    volumes:
      - ./services/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Loki for log aggregation with 1h retention
  loki:
    image: grafana/loki:2.9.3
    container_name: joustmania-loki
    user: "0"  # Run as root to avoid permission issues with volume
    # Port exposed only within Docker network (envoy proxies to it)
    expose:
      - "3100"
    volumes:
      - ./services/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test:  ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Connect-Web Proxy (gRPC to Connect protocol translation)
  connect-proxy:
    image: ghcr.io/watchmejoustmyflags/joustmania/connect-proxy:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/connect-proxy/Dockerfile
    container_name: joustmania-connect-proxy
    # Port exposed only within Docker network (envoy proxies to it)
    expose:
      - "8080"
    environment:
      - CONTROLLER_MANAGER_SERVICE=controller-manager:50052
      - GAME_COORDINATOR_SERVICE=game-coordinator:50053
      - MENU_SERVICE=menu:50054
      - SETTINGS_SERVICE=settings:50051
    depends_on:
      controller-manager:
        condition: service_healthy
      game-coordinator:
        condition: service_healthy
      menu:
        condition: service_healthy
      settings:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Dashboard (Real-time controller visualization SPA)
  dashboard:
    image: ghcr.io/watchmejoustmyflags/joustmania/dashboard:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: joustmania-dashboard
    # Port exposed only within Docker network (envoy proxies to it)
    expose:
      - "8080"
    networks:
      - joustmania
    restart: unless-stopped
    # Healthcheck defined in Dockerfile

  # Envoy - Main entry point (reverse proxy)
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: joustmania-envoy
    ports:
      - "80:80"  # Main entry point (all services proxied through envoy)
    volumes:
      - ./services/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      connect-proxy:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
      webui:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - joustmania
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  joustmania:
    driver: bridge
    name: joustmania-network

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
