syntax = "proto3";

package joustmania.controller_manager;

// ControllerManager Service - Manages PS Move controllers
service ControllerManagerService {
  // Get controller count
  rpc GetControllerCount(GetControllerCountRequest) returns (GetControllerCountResponse);

  // Get ready controllers
  rpc GetReadyControllers(GetReadyControllersRequest) returns (GetReadyControllersResponse);

  // Get all controller states
  rpc GetControllers(GetControllersRequest) returns (GetControllersResponse);

  // Stream controller states (real-time updates)
  // DEPRECATED: Use StreamButtonEvents for menu/UI and StreamGameplayData for games
  rpc StreamControllerStates(StreamRequest) returns (stream ControllerStateUpdate);

  // Stream button press/release events (Phase 41 - event-driven for menu/UI)
  rpc StreamButtonEvents(ButtonEventStreamRequest) returns (stream ButtonEvent);

  // Stream gameplay data (acceleration/gyro only, Phase 41 - for game modes)
  rpc StreamGameplayData(GameplayStreamRequest) returns (stream GameplayDataUpdate);

  // Stream gameplay data with dynamic filtering (Phase 45 - bidirectional streaming)
  rpc StreamGameplayDataDynamic(stream GameplayStreamControl) returns (stream GameplayDataUpdate);

  // Pair a new controller
  rpc PairController(PairControllerRequest) returns (PairControllerResponse);

  // Remove a controller
  rpc RemoveController(RemoveControllerRequest) returns (RemoveControllerResponse);

  // Controller feedback RPCs (Phase 19)
  // Set LED color
  rpc SetControllerColor(SetControllerColorRequest) returns (SetControllerColorResponse);

  // Set vibration intensity
  rpc SetControllerVibration(SetControllerVibrationRequest) returns (SetControllerVibrationResponse);

  // Play predefined effect (flash, pulse, rainbow, etc.)
  rpc PlayControllerEffect(PlayControllerEffectRequest) returns (PlayControllerEffectResponse);
}

// Controller state data
message ControllerState {
  string serial = 1;
  int32 move_num = 2;
  int32 battery = 3;
  bool trigger_pressed = 4;
  bool move_pressed = 5;
  bool ready = 6;
  int32 team = 7;
  RGB color = 8;
  Vector3 accel = 9;
  Vector3 gyro = 10;

  // Additional button states (Phase 23 - Admin Mode)
  bool cross_pressed = 11;      // X button
  bool circle_pressed = 12;     // O button
  bool square_pressed = 13;     // Square button
  bool triangle_pressed = 14;   // Triangle button
  bool ps_pressed = 15;         // PlayStation button
}

message RGB {
  int32 r = 1;
  int32 g = 2;
  int32 b = 3;
}

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

// Request/Response messages
message GetControllerCountRequest {}

message GetControllerCountResponse {
  int32 count = 1;
  bool success = 2;
  string error = 3;
}

message GetReadyControllersRequest {}

message GetReadyControllersResponse {
  repeated ControllerState controllers = 1;
  bool success = 2;
  string error = 3;
}

message GetControllersRequest {}

message GetControllersResponse {
  repeated ControllerState controllers = 1;
  bool success = 2;
  string error = 3;
}

message StreamRequest {
  int32 update_frequency_hz = 1;  // Desired update frequency (default: 60)
}

message ControllerStateUpdate {
  repeated ControllerState controllers = 1;
  int64 timestamp = 2;  // Unix timestamp in milliseconds
}

message PairControllerRequest {
  int32 color_index = 1;  // Team color index
}

message PairControllerResponse {
  bool success = 1;
  string error = 2;
  string serial = 3;  // Serial of paired controller
}

message RemoveControllerRequest {
  string serial = 1;
}

message RemoveControllerResponse {
  bool success = 1;
  string error = 2;
}

// Controller feedback messages (Phase 19)
message SetControllerColorRequest {
  string serial = 1;  // Controller serial (empty = all controllers)
  RGB color = 2;      // RGB color to set
  int32 duration_ms = 3;  // Duration in milliseconds (0 = permanent)
}

message SetControllerColorResponse {
  bool success = 1;
  string error = 2;
}

message SetControllerVibrationRequest {
  string serial = 1;  // Controller serial (empty = all controllers)
  int32 intensity = 2;  // Vibration intensity (0-255)
  int32 duration_ms = 3;  // Duration in milliseconds
}

message SetControllerVibrationResponse {
  bool success = 1;
  string error = 2;
}

// Controller effects
enum ControllerEffect {
  EFFECT_NONE = 0;
  EFFECT_FLASH = 1;      // Rapid on/off flashing
  EFFECT_PULSE = 2;      // Smooth breathing effect
  EFFECT_RAINBOW = 3;    // Cycle through rainbow colors
  EFFECT_FADE_OUT = 4;   // Fade to black over duration
  EFFECT_FADE_IN = 5;    // Fade from black to color
}

message PlayControllerEffectRequest {
  string serial = 1;  // Controller serial (empty = all controllers)
  ControllerEffect effect = 2;  // Effect to play
  RGB color = 3;      // Base color for effect (if applicable)
  int32 duration_ms = 4;  // Effect duration in milliseconds
  int32 speed = 5;    // Effect speed (1-10, default 5)
}

message PlayControllerEffectResponse {
  bool success = 1;
  string error = 2;
}

// Phase 41: Button event streaming (event-driven for menu/UI)
enum ButtonType {
  BUTTON_TRIGGER = 0;
  BUTTON_MOVE = 1;
  BUTTON_CROSS = 2;
  BUTTON_CIRCLE = 3;
  BUTTON_SQUARE = 4;
  BUTTON_TRIANGLE = 5;
  BUTTON_PS = 6;
}

enum ButtonAction {
  ACTION_PRESS = 0;    // Button transitioned from released to pressed
  ACTION_RELEASE = 1;  // Button transitioned from pressed to released
}

message ButtonEvent {
  string serial = 1;
  int64 timestamp = 2;     // Unix timestamp in milliseconds
  ButtonType button = 3;   // Which button
  ButtonAction action = 4; // Press or release
  int32 battery = 5;       // Battery level at time of event
  RGB color = 6;           // Current controller color
}

message ButtonEventStreamRequest {
  // Empty - all button events are streamed
  // Could add filter options in future (e.g., specific buttons, controllers)
}

// Phase 41: Gameplay data streaming (acceleration/gyro only, no buttons)
message GameplayData {
  string serial = 1;
  int32 move_num = 2;
  int32 battery = 3;
  bool ready = 4;
  int32 team = 5;
  RGB color = 6;
  Vector3 accel = 7;  // Primary gameplay data
  Vector3 gyro = 8;   // Secondary gameplay data
  // NO button states - use StreamButtonEvents if buttons are needed
}

message GameplayDataUpdate {
  repeated GameplayData controllers = 1;
  int64 timestamp = 2;  // Unix timestamp in milliseconds
}

message GameplayStreamRequest {
  int32 update_frequency_hz = 1;  // Desired update frequency (default: 60)
}

// Phase 45: Bidirectional streaming for dynamic controller filtering
// Control messages sent by client to update stream behavior mid-stream
message GameplayStreamControl {
  oneof control {
    GameplayStreamConfig config = 1;           // Initial configuration
    FilterUpdate filter_update = 2;            // Mid-stream filter change
    ColorCommand color_command = 3;            // Controller color change (Phase 46)
    EffectCommand effect_command = 4;          // Controller effect (Phase 46)
    VibrationCommand vibration_command = 5;    // Controller vibration (Phase 46)
    CombinedFeedback combined_feedback = 6;    // Combined color + vibration (Phase 46)
  }
}

// Initial stream configuration (sent once at start)
message GameplayStreamConfig {
  int32 update_frequency_hz = 1;            // Game loop frequency
  repeated string serials = 2;              // Initial filter (empty = all controllers)
}

// Filter update (sent when alive players change)
message FilterUpdate {
  repeated string serials = 1;              // New filter list (empty = all controllers)
}

// Phase 46: Stream-based feedback commands
// Set controller color via stream
message ColorCommand {
  string serial = 1;          // Target controller (empty = all)
  RGB color = 2;              // RGB color to set
}

// Play controller effect via stream
message EffectCommand {
  string serial = 1;          // Target controller (empty = all)
  ControllerEffect effect = 2; // Effect to play
  RGB color = 3;              // Base color for effect (optional)
  int32 duration_ms = 4;      // Effect duration (optional, 0 = use default)
}

// Set controller vibration via stream
message VibrationCommand {
  string serial = 1;          // Target controller (empty = all)
  int32 intensity = 2;        // Vibration intensity (0-255)
  int32 duration_ms = 3;      // Vibration duration in milliseconds
}

// Combined color and vibration feedback via stream
// Useful for events like death, hit, spawn where both are needed
message CombinedFeedback {
  string serial = 1;          // Target controller (empty = all)
  RGB color = 2;              // Color to set
  int32 vibration_intensity = 3;  // Vibration intensity (0-255, 0 = no vibration)
  int32 vibration_duration_ms = 4; // Vibration duration in milliseconds
}
