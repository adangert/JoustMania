syntax = "proto3";

package joustmania.controller_manager;

option go_package = "github.com/joustmania/connect-proxy/gen/controller_manager";

// ControllerManager Service - Manages PS Move controllers
service ControllerManagerService {
  // Stream button press/release events (Phase 41 - event-driven for menu/UI)
  // Phase XX: Made bidirectional for LED state ownership - menu can send base colors and effects
  rpc StreamButtonEvents(stream ButtonEventStreamControl) returns (stream ButtonEvent);

  // Stream gameplay data with dynamic filtering (Phase 45 - bidirectional streaming)
  // Supports mid-stream filter changes, color commands, and game effects
  rpc StreamGameplayData(stream GameplayStreamControl) returns (stream GameplayDataUpdate);

  // Rename a controller (set custom human-readable name)
  rpc RenameController(RenameControllerRequest) returns (RenameControllerResponse);

}

// Controller state data
message ControllerState {
  string serial = 1;
  int32 move_num = 2;
  int32 battery = 3;
  bool trigger_pressed = 4;
  bool move_pressed = 5;
  // Field 6 removed (was: bool ready) - ready state is tracked by Menu service
  int32 team = 7;
  RGB color = 8;
  Vector3 accel = 9;
  Vector3 gyro = 10;

  // Additional button states (Phase 23 - Admin Mode)
  bool cross_pressed = 11;      // X button
  bool circle_pressed = 12;     // O button
  bool square_pressed = 13;     // Square button
  bool triangle_pressed = 14;   // Triangle button
  bool ps_pressed = 15;         // PlayStation button

  // Connection strength (Phase 48)
  int32 rssi = 16;              // Signal strength in dBm (-100 to 0, 0 = USB/unavailable)

  // Additional button states (Phase 79 - Admin Mode Game Selection)
  bool select_pressed = 17;     // Select button
  bool start_pressed = 18;      // Start button

  // Human-readable name (Issue #7)
  string name = 19;             // Auto-generated or user-assigned name
}

message RGB {
  int32 r = 1;
  int32 g = 2;
  int32 b = 3;
}

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

// Phase 41: Button event streaming (event-driven for menu/UI)
enum ButtonType {
  BUTTON_TRIGGER = 0;
  BUTTON_MOVE = 1;
  BUTTON_CROSS = 2;
  BUTTON_CIRCLE = 3;
  BUTTON_SQUARE = 4;
  BUTTON_TRIANGLE = 5;
  BUTTON_PS = 6;
  BUTTON_SELECT = 7;
  BUTTON_START = 8;
}

enum ButtonAction {
  ACTION_PRESS = 0;    // Button transitioned from released to pressed
  ACTION_RELEASE = 1;  // Button transitioned from pressed to released
}

// Event types for the button event stream (also handles connection events)
enum ControllerEventType {
  EVENT_BUTTON = 0;      // Button press/release (default for backwards compatibility)
  EVENT_CONNECT = 1;     // Controller connected
  EVENT_DISCONNECT = 2;  // Controller disconnected
}

message ButtonEvent {
  string serial = 1;
  int64 timestamp = 2;     // Unix timestamp in milliseconds
  ButtonType button = 3;   // Which button (only set for EVENT_BUTTON)
  ButtonAction action = 4; // Press or release (only set for EVENT_BUTTON)
  int32 battery = 5;       // Battery level at time of event
  RGB color = 6;           // Current controller color
  ControllerEventType event_type = 7;  // Event type (default EVENT_BUTTON for backwards compat)
  string name = 8;         // Human-readable controller name (Issue #7)
}

// Phase XX: Bidirectional control for button event stream (menu/UI)
// Menu sends base colors and effects, receives button events
message ButtonEventStreamControl {
  oneof control {
    ButtonEventStreamConfig config = 1;      // Initial configuration (can be empty)
    ControllerColorConfig base_color = 2;    // Set base color for a controller
    GameEffectCommand game_effect = 3;       // Trigger semantic game effect
  }
}

// Initial configuration for button event stream
message ButtonEventStreamConfig {
  // Empty for now - all button events are streamed
  // Could add filter options in future (e.g., specific buttons, controllers)
}

// Phase 41: Gameplay data streaming (acceleration/gyro only, no buttons)
message GameplayData {
  string serial = 1;
  int32 move_num = 2;
  int32 battery = 3;
  // Field 4 removed (was: bool ready) - ready state is tracked by Menu service
  int32 team = 5;
  RGB color = 6;
  Vector3 accel = 7;  // Primary gameplay data
  Vector3 gyro = 8;   // Secondary gameplay data
  // NO button states - use StreamButtonEvents if buttons are needed
  int32 rssi = 9;     // Signal strength in dBm (-100 to 0, 0 = USB/unavailable)
  string name = 10;   // Human-readable controller name (Issue #7)
}

message GameplayDataUpdate {
  repeated GameplayData controllers = 1;
  int64 timestamp = 2;  // Unix timestamp in milliseconds
}

message GameplayStreamRequest {
  int32 update_frequency_hz = 1;  // Desired update frequency (default: 60)
}

// Phase 45: Bidirectional streaming for dynamic controller filtering
// Control messages sent by client to update stream behavior mid-stream
message GameplayStreamControl {
  oneof control {
    GameplayStreamConfig config = 1;           // Initial configuration
    FilterUpdate filter_update = 2;            // Mid-stream filter change
    ControllerColorConfig base_color = 7;      // Set base color for a controller
    GameEffectCommand game_effect = 8;         // Trigger semantic game effect
  }
}

// Initial stream configuration (sent once at start)
message GameplayStreamConfig {
  int32 update_frequency_hz = 1;            // Game loop frequency
  reserved 2;                               // Removed: serials field (use colors instead)
  reserved "serials";
  repeated ControllerColorConfig colors = 3; // Initial base colors for players (serials derived from this)
}

// Filter update (sent when alive players change)
message FilterUpdate {
  repeated string serials = 1;              // New filter list (empty = all controllers)
}

// Phase XX: LED State Ownership
// Controller manager is the single owner of all LED state
// Clients send base colors, controller manager handles effects and auto-restore

// Simple controller color assignment - controller manager only cares about serial + color
message ControllerColorConfig {
  string serial = 1;  // Controller serial
  RGB color = 2;      // Base color for this controller
}

// Semantic game effects (controller manager handles animation and restore to base color)
enum GameEffect {
  GAME_EFFECT_NONE = 0;
  GAME_EFFECT_PLAYER_WARNING = 1;   // White flash + vibrate, restore to base color
  GAME_EFFECT_PLAYER_DEATH = 2;     // Red + vibrate, stays red (dead)
  GAME_EFFECT_PLAYER_RESPAWN = 3;   // White during spawn protection
  GAME_EFFECT_WINNER_RAINBOW = 4;   // Rainbow 3s, restore to base color
  GAME_EFFECT_COUNTDOWN = 5;        // Full countdown: Red(750ms)→Yellow(750ms)→Green(750ms), restore to base
  GAME_EFFECT_ADMIN_ENTER = 6;      // White flash 3x, then persistent white
  GAME_EFFECT_ADMIN_EXIT = 7;       // Restore to base color
  GAME_EFFECT_LOW_BATTERY = 8;      // Red flash 2x warning
  GAME_EFFECT_FORCE_START_CHARGE = 9;  // Fade white→dim over 2s (force start countdown)
  GAME_EFFECT_SHOW_BATTERY = 10;    // Show battery level on ALL controllers (green/orange/red based on level)
  GAME_EFFECT_RUMBLE = 11;          // Vibrate only (for secret signaling like traitor/werewolf)
  GAME_EFFECT_PULSE = 12;           // Pulse with color, restore to base (for confirmations/announcements)
  GAME_EFFECT_FLASH = 13;           // Brief flash with color, restore to base
}

// Trigger a game effect via stream
// For effects that need customization, optional color/duration/speed can be provided
message GameEffectCommand {
  string serial = 1;      // Controller serial (empty = all controllers for broadcast)
  GameEffect effect = 2;  // Effect to trigger
  RGB color = 3;          // Optional: override effect color (for PULSE, FLASH, etc.)
  int32 duration_ms = 4;  // Optional: override effect duration (0 = use default)
  int32 speed = 5;        // Optional: override effect speed (0 = use default)

  // Trace context for distributed tracing (W3C Trace Context format)
  string trace_parent = 10;  // W3C traceparent header value
  string trace_state = 11;   // W3C tracestate header value
}

// Rename controller request/response (Issue #7)
message RenameControllerRequest {
  string serial = 1;      // Controller serial to rename
  string name = 2;        // New human-readable name
}

message RenameControllerResponse {
  bool success = 1;
  string error = 2;       // Error message if success is false
}
