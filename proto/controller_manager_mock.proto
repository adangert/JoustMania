syntax = "proto3";

package controller_manager_mock;

option go_package = "github.com/joustmania/connect-proxy/gen/controller_manager_mock";

// Additional RPCs for mock controller control
service MockControllerService {
    // Simulate controller movement
    rpc SimulateMovement(MovementRequest) returns (MovementResponse);

    // Simulate death (high acceleration)
    rpc SimulateDeath(DeathRequest) returns (DeathResponse);

    // Simulate button press
    rpc SimulateButton(ButtonRequest) returns (ButtonResponse);

    // Set LED color
    rpc SetColor(ColorRequest) returns (ColorResponse);

    // Reset controller to idle
    rpc ResetController(ResetRequest) returns (ResetResponse);

    // Get list of mock controllers
    rpc ListMockControllers(ListRequest) returns (ListResponse);

    // Set auto game end - automatically kill players after duration to ensure game ends
    rpc SetAutoGameEnd(AutoGameEndRequest) returns (AutoGameEndResponse);

    // Get current LED color of a controller
    rpc GetColor(GetColorRequest) returns (GetColorResponse);

    // Stream observable events from mock controllers (LED changes, button presses, etc.)
    rpc StreamObservability(ObservabilityRequest) returns (stream ObservabilityEvent);
}

message MovementRequest {
    string serial = 1;
    float accel_x = 2;
    float accel_y = 3;
    float accel_z = 4;
}

message MovementResponse {
    bool success = 1;
    string error = 2;
}

message DeathRequest {
    string serial = 1;
}

message DeathResponse {
    bool success = 1;
    float accel_magnitude = 2;  // Actual simulated magnitude
}

message ButtonRequest {
    string serial = 1;
    enum Button {
        TRIGGER = 0;
        MOVE = 1;
        SELECT = 2;
        START = 3;
    }
    Button button = 2;
    bool pressed = 3;
}

message ButtonResponse {
    bool success = 1;
    string error = 2;
}

message ColorRequest {
    string serial = 1;
    int32 r = 2;
    int32 g = 3;
    int32 b = 4;
}

message ColorResponse {
    bool success = 1;
    string error = 2;
}

message ResetRequest {
    string serial = 1;
}

message ResetResponse {
    bool success = 1;
    string error = 2;
}

message ListRequest {}

message ListResponse {
    repeated string serials = 1;
    int32 count = 2;
}

message AutoGameEndRequest {
    float duration_seconds = 1;  // After this time, automatically kill all but one player
    bool enabled = 2;            // Enable/disable auto-end feature
}

message AutoGameEndResponse {
    bool success = 1;
    string error = 2;
}

// GetColor - retrieve current LED color
message GetColorRequest {
    string serial = 1;
}

message GetColorResponse {
    bool success = 1;
    string error = 2;
    int32 r = 3;
    int32 g = 4;
    int32 b = 5;
}

// StreamObservability - stream of observable events from mock controllers
message ObservabilityRequest {
    // Empty - streams all events
}

message ObservabilityEvent {
    int64 timestamp_ms = 1;
    string serial = 2;

    oneof event {
        LedChangeEvent led_change = 10;
        RumbleChangeEvent rumble_change = 11;
        ButtonChangeEvent button_change = 12;
        ConnectionEvent connection = 13;
    }
}

message LedChangeEvent {
    int32 r = 1;
    int32 g = 2;
    int32 b = 3;
    string source = 4;  // "base_color", "effect", "game_effect", etc.
}

message RumbleChangeEvent {
    int32 intensity = 1;
}

message ButtonChangeEvent {
    string button = 1;
    bool pressed = 2;
}

message ConnectionEvent {
    bool connected = 1;
}
