syntax = "proto3";

package joustmania.game_coordinator;

option go_package = "github.com/joustmania/connect-proxy/gen/game_coordinator";

// GameCoordinator Service - Manages game lifecycle and coordination
service GameCoordinatorService {
  // Start a game
  rpc StartGame(StartGameRequest) returns (StartGameResponse);

  // Force end current game
  rpc ForceEndGame(ForceEndGameRequest) returns (ForceEndGameResponse);

  // Stream game events (deaths, scoring, etc.)
  rpc StreamGameEvents(StreamEventsRequest) returns (stream GameEvent);
}

// Game status
enum GameState {
  IDLE = 0;
  STARTING = 1;
  RUNNING = 2;
  ENDING = 3;
  ENDED = 4;
}

message Player {
  string serial = 1;
  int32 team = 2;
  bool alive = 3;
  int32 score = 4;
}

// Request/Response messages
message StartGameRequest {
  string game_name = 1;  // e.g., "JoustFFA", "Werewolf"
  repeated Player players = 2;
  map<string, string> settings = 3;  // Game-specific settings
}

message StartGameResponse {
  bool success = 1;
  string error = 2;
  string game_id = 3;  // Unique game identifier
}

message ForceEndGameRequest {
  string reason = 1;  // Reason for force ending
}

message ForceEndGameResponse {
  bool success = 1;
  string error = 2;
}

message StreamEventsRequest {}

message GameEvent {
  string event_type = 1;  // "player_death", "game_start", "game_end", "score_update"
  map<string, string> data = 2;  // Event-specific data
  int64 timestamp = 3;  // Unix timestamp in milliseconds
}
