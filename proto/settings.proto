syntax = "proto3";

package joustmania.settings;

option go_package = "github.com/joustmania/connect-proxy/gen/settings";

// Settings Service - Manages game configuration and settings
service SettingsService {
  // Get all settings as a map
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);

  // Get a specific setting by key
  rpc GetSetting(GetSettingRequest) returns (GetSettingResponse);

  // Update a specific setting
  rpc UpdateSetting(UpdateSettingRequest) returns (UpdateSettingResponse);

  // Subscribe to setting change events (server-side streaming)
  rpc SubscribeToChanges(SubscribeRequest) returns (stream SettingChangeEvent);
}

// Request: Get all settings
message GetSettingsRequest {
  // Empty - no parameters needed
}

// Response: All settings as key-value pairs
message GetSettingsResponse {
  map<string, string> settings = 1;
  bool success = 2;
  string error = 3;
}

// Request: Get specific setting
message GetSettingRequest {
  string key = 1;
}

// Response: Specific setting value
message GetSettingResponse {
  string key = 1;
  string value = 2;
  bool success = 3;
  string error = 4;
}

// Request: Update a setting
message UpdateSettingRequest {
  string key = 1;
  string value = 2;
  string source = 3;  // Who/what triggered this change (e.g., "webui", "game", "admin")
}

// Response: Update confirmation
message UpdateSettingResponse {
  bool success = 1;
  string error = 2;
  string old_value = 3;  // Previous value before update
  string new_value = 4;  // New value after update
}

// Request: Subscribe to change events
message SubscribeRequest {
  // Optional filter for specific keys
  repeated string keys = 1;  // Empty = subscribe to all changes
}

// Event: Setting changed
message SettingChangeEvent {
  string key = 1;
  string old_value = 2;
  string new_value = 3;
  string source = 4;         // Who/what triggered this change
  int64 timestamp = 5;       // Unix timestamp in milliseconds
}
