[project]
name = "joustmania"
version = "2.0.0"
description = "Multi-player gaming system using PS Move controllers"
requires-python = ">=3.9,<3.13"
dependencies = [
    # Main application dependencies
    "flask>=2.0.0",
    "Flask-WTF>=1.0.0",
    "pyalsaaudio>=0.9.0",
    "pydub>=0.25.0",
    "pyyaml>=6.0",
    "dbus-python>=1.2.0",
    "python-dotenv>=0.19.0",
    "pygame>=2.0.0",
    # audioop is in stdlib for Python <3.13, audioop-lts for >=3.13
    "audioop-lts>=0.2.0; python_version >= '3.13'",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.setuptools]
packages = ["core", "utils"]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[tool.uv]
dev-dependencies = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.uv.workspace]
members = [
    "services/controller_manager",
    "services/game_coordinator",
    "services/settings",
    "services/supervisor",
    "services/menu",
]
