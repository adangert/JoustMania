<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JoustMania Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>JoustMania Dashboard</h1>
        <div class="header-controls">
          <button id="settings-btn" class="icon-btn" title="Settings">
            <span class="icon">&#9881;</span>
          </button>
        </div>
      </header>

      <div class="controls-bar">
        <div class="mode-selector">
          <label for="game-mode">Mode:</label>
          <select id="game-mode">
            <option value="JoustFFA">Joust FFA</option>
            <option value="JoustTeams">Joust Teams</option>
            <option value="JoustRandomTeams">Random Teams</option>
            <option value="Werewolf">Werewolf</option>
            <option value="Zombies">Zombies</option>
            <option value="Commander">Commander</option>
            <option value="Ninja">Ninja</option>
            <option value="Swapper">Swapper</option>
            <option value="Tournament">Tournament</option>
          </select>
        </div>
        <div class="game-actions">
          <button id="start-btn" class="btn btn-primary">
            <span class="icon">&#9654;</span> Start Game
          </button>
          <button id="stop-btn" class="btn btn-danger" disabled>
            <span class="icon">&#9632;</span> Stop
          </button>
        </div>
      </div>

      <!-- Tab Navigation -->
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="controllers">
          <span class="tab-icon">&#127918;</span> Controllers
        </button>
        <button class="tab-btn" data-tab="metrics">
          <span class="tab-icon">&#128200;</span> Metrics
        </button>
        <button class="tab-btn" data-tab="traces">
          <span class="tab-icon">&#128269;</span> Traces
        </button>
      </nav>

      <main class="main-content">
        <!-- Controllers Tab -->
        <div id="tab-controllers" class="tab-panel active">
          <div id="controller-grid" class="controller-grid">
            <!-- Controller cards will be rendered here -->
            <div class="loading">Connecting to controller manager...</div>
          </div>
        </div>

        <!-- Metrics Tab (Grafana) -->
        <div id="tab-metrics" class="tab-panel">
          <div class="embed-container">
            <div class="embed-header">
              <h3>Controller Health</h3>
              <a href="/grafana/d/joustmania-controller-health" target="_blank" class="external-link">Open in Grafana &#8599;</a>
            </div>
            <iframe
              id="grafana-embed"
              src="/grafana/d/joustmania-controller-health/controller-health?orgId=1&theme=dark&kiosk"
              class="embed-iframe"
            ></iframe>
          </div>
        </div>

        <!-- Traces Tab (Jaeger) -->
        <div id="tab-traces" class="tab-panel">
          <div class="embed-container">
            <div class="embed-header">
              <h3>Game Traces</h3>
              <a href="/jaeger/search?service=game_coordinator" target="_blank" class="external-link">Open in Jaeger &#8599;</a>
            </div>
            <iframe
              id="jaeger-embed"
              src="/jaeger/search?service=game_coordinator&limit=20"
              class="embed-iframe"
            ></iframe>
          </div>
        </div>
      </main>

      <footer class="status-bar">
        <div class="game-status">
          <span id="game-state">Game: <strong>Idle</strong></span>
          <span class="separator">|</span>
          <span id="player-count">Players: <strong>0</strong> connected</span>
          <span class="separator">|</span>
          <span id="alive-count">Alive: <strong>-</strong></span>
        </div>
        <div id="event-log" class="event-log">
          <!-- Recent events will appear here -->
        </div>
      </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="close-settings" class="close-btn">&times;</button>
        </div>
        <div id="settings-list" class="settings-list">
          <!-- Settings will be loaded here -->
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
