# Jaeger v2 Configuration
# Based on OpenTelemetry Collector configuration format
#
# Reference: https://www.jaegertracing.io/docs/2.0/configuration/
service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]

extensions:
  jaeger_storage:
    backends:
      memory:
        memory:
          max_traces: 100000
  jaeger_query:
    base_path: /jaeger
    storage:
      traces: memory

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  jaeger_storage_exporter:
    trace_storage: memory