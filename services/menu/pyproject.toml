[project]
name = "joustmania-menu"
version = "1.0.0"
description = "Menu microservice for JoustMania"
requires-python = ">=3.9,<3.13"
dependencies = [
    # Core dependencies
    "pyyaml>=6.0",
    "pygame>=2.0.0",
    "pyalsaaudio>=0.9.0",
    "pydub>=0.25.0",
    # audioop is in stdlib for Python <3.13, audioop-lts for >=3.13
    "audioop-lts>=0.2.0; python_version >= '3.13'",

    # OpenTelemetry
    "opentelemetry-distro>=0.43b0",
    "opentelemetry-exporter-otlp>=1.22.0",
]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"
