global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'joustmania'
    environment: 'production'

rule_files:
  - 'alerts.yml'

scrape_configs:
  # OTEL Collector - aggregates metrics from real-time services (Issue #106)
  # Services push metrics via OTLP; collector exposes them on :8889
  - job_name: 'otel-collector'
    scrape_interval: 500ms
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          collector: 'otel'
    # Map service_name label to job label so dashboard queries work
    # OTEL metrics have service_name="controller-manager" etc.
    metric_relabel_configs:
      - source_labels: [service_name]
        target_label: job
        regex: (.+)
        replacement: $1

  # Controller Manager Service
  - job_name: 'controller-manager'
    static_configs:
      - targets: ['controller-manager:8000']
        labels:
          service: 'controller-manager'

  # Game Coordinator Service
  - job_name: 'game-coordinator'
    static_configs:
      - targets: ['game-coordinator:8000']
        labels:
          service: 'game-coordinator'

  # Menu Service
  - job_name: 'menu'
    static_configs:
      - targets: ['menu:8000']
        labels:
          service: 'menu'

  # Settings Service
  - job_name: 'settings'
    static_configs:
      - targets: ['settings:8000']
        labels:
          service: 'settings'

  # Audio Service
  - job_name: 'audio'
    static_configs:
      - targets: ['audio:8000']
        labels:
          service: 'audio'

  # --- Observability Stack ---

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Loki
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # VictoriaMetrics
  - job_name: 'victoria-metrics'
    static_configs:
      - targets: ['victoria-metrics:8428']

  # Node Exporter (host metrics - CPU, memory, disk, temperature)
  - job_name: 'node'
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'raspberry-pi'

  # PS Move Pairing Daemon (runs on host, not in Docker)
  - job_name: 'psmove-pairing'
    static_configs:
      - targets: ['host.docker.internal:8002']
        labels:
          service: 'psmove-pairing'
