global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'joustmania'
    environment: 'production'

rule_files:
  - 'alerts.yml'

scrape_configs:
  # OTEL Collector - aggregates metrics from real-time services (Issue #106)
  # Services push metrics via OTLP; collector exposes them on :8889
  - job_name: 'otel-collector'
    scrape_interval: 500ms
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          collector: 'otel'
    # Map service_name label to job label so dashboard queries work
    # OTEL metrics have service_name="controller-manager" etc.
    metric_relabel_configs:
      - source_labels: [service_name]
        target_label: job
        regex: (.+)
        replacement: $1

  # Menu Service (still uses prometheus_client pull)
  - job_name: 'menu'
    static_configs:
      - targets: ['menu:8000']
        labels:
          service: 'menu'

  # Settings Service (still uses prometheus_client pull)
  - job_name: 'settings'
    static_configs:
      - targets: ['settings:8000']
        labels:
          service: 'settings'

  # WebUI Service (still uses prometheus_client pull)
  - job_name: 'webui'
    static_configs:
      - targets: ['webui:8000']
        labels:
          service: 'webui'

  # Audio Service (still uses prometheus_client pull)
  - job_name: 'audio'
    static_configs:
      - targets: ['audio:8000']
        labels:
          service: 'audio'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (host metrics - CPU, memory, disk, temperature)
  - job_name: 'node'
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'raspberry-pi'

  # PS Move Pairing Daemon (runs on host, not in Docker)
  - job_name: 'psmove-pairing'
    static_configs:
      - targets: ['host.docker.internal:8002']
        labels:
          service: 'psmove-pairing'
