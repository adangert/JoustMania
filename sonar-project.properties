# SonarCloud configuration for JoustMania
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

sonar.projectKey=WatchMeJoustMyFlags_JoustMania
sonar.organization=watchmejoustmyflags

# Project metadata
sonar.projectName=JoustMania
sonar.projectVersion=2.0.0

# Source code locations
sonar.sources=services,lib
sonar.tests=services/controller_manager/tests,services/game_coordinator/tests,services/menu/tests,services/audio/tests,services/settings/tests,tests/integration

# Python configuration
sonar.python.version=3.11

# Coverage report paths (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude from analysis
sonar.exclusions=\
  **/proto/*_pb2*.py,\
  **/node_modules/**,\
  **/.venv/**,\
  **/.venv-test/**,\
  **/legacy/**,\
  **/Archive/**,\
  **/__pycache__/**,\
  **/tests/**,\
  services/grafana/**,\
  services/prometheus/**,\
  services/jaeger/**,\
  services/loki/**,\
  services/otel-collector/**,\
  services/envoy/**

# Test file patterns
sonar.test.inclusions=**/tests/**/*.py,tests/**/*.py

# Encoding
sonar.sourceEncoding=UTF-8
